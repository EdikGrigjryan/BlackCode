<!doctype html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Header Accordion</title>

	<style>
		* {
			padding: 0;
			margin: 0;
			box-sizing: border-box;
			font-family: system-ui, sans-serif;
			list-style: none;
			text-decoration: none;
		}

		body{
			background: #f5f5f5;
		}

		[class*="__container"]{
			max-width: 1260px;
			margin: 0 auto;
			padding: 0 20px;
		}

		/* HEADER */

		.header{
			width: 100%;
			height: 100px;
			background-color: #fff;
			border-bottom: 3px solid #02befe;
		}

		.header__container{
			width: 100%;
			height: 100%;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.header__logo{
			width: 180px;
		}

		.menu{
			display: flex;
			align-items: center;
			gap: 40px;
		}

		.menu__link{
			color: #02befe;
			font-size: 18px;
			font-weight: 600;
			transition: 0.3s;
		}

		.menu__link:hover{
			color: #0095c7;
		}

		.header__btn{
			width: 170px;
			height: 50px;
			border: 1px solid #02befe;
			background: white;
			border-radius: 50px;
			font-size: 18px;
			color: #02befe;
			cursor: pointer;
			transition: 0.3s;
		}

		.header__btn:hover{
			background: #02befe;
			color: white;
		}

		/* ACCORDION */

		.dropdown{
			position: relative;
		}

		.dropdown__menu{
			position: absolute;
			top: 35px;
			left: 0;
			width: 220px;
			background: white;
			border-radius: 15px;
			overflow: hidden;

			opacity: 0;
			visibility: hidden;
			transform: translateY(10px);

			transition: 0.3s;
			box-shadow: 0 10px 30px rgba(0,0,0,0.1);
		}

		.dropdown:hover .dropdown__menu{
			opacity: 1;
			visibility: visible;
			transform: translateY(0);
		}

		.dropdown__menu li{
			border-bottom: 1px solid #eee;
		}

		.dropdown__menu li:last-child{
			border-bottom: none;
		}

		.dropdown__menu a{
			display: block;
			padding: 16px;
			color: #02befe;
			font-weight: 500;
			transition: 0.3s;
		}

		.dropdown__menu a:hover{
			background: #02befe;
			color: white;
			padding-left: 25px;
		}
	</style>
</head>

<body>

	<header class="header">
		<div class="header__container">

			<a href="#">
				<img class="header__logo" src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Logo_TV_2015.png" alt="">
			</a>

			<ul class="menu">

				<!-- DROPDOWN 1 -->
				<li class="dropdown">
					<a href="#" class="menu__link">Skills ▼</a>

					<ul class="dropdown__menu">
						<li><a href="#">HTML</a></li>
						<li><a href="#">CSS</a></li>
						<li><a href="#">JavaScript</a></li>
						<li><a href="#">More Info</a></li>
					</ul>
				</li>

				<!-- NORMAL LINK -->
				<li>
					<a href="#" class="menu__link">About Me</a>
				</li>

				<!-- DROPDOWN 2 -->
				<li class="dropdown">
					<a href="#" class="menu__link">Development ▼</a>

					<ul class="dropdown__menu">
						<li><a href="#">Stages</a></li>
						<li><a href="#">Portfolio</a></li>
						<li><a href="#">More Info</a></li>
					</ul>
				</li>

			</ul>

			<button class="header__btn">
				Contact
			</button>

		</div>
	</header>

</body>
</html>
